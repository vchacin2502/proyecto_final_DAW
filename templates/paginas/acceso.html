{% extends "base.html" %}

{% block titulo %}Acceso{% endblock %}

{% block contenido %}
  <h2 class="h4 mb-3">Iniciar sesión</h2>
  <form method="post" action="{% url 'acceso' %}" class="row g-3" novalidate>
    {% csrf_token %}
    <input type="hidden" name="next" value="{{ next_url }}">
    <div class="col-12">
      <label for="username" class="form-label">Usuario</label>
      <input id="username" name="username" type="text" class="form-control" placeholder="Tu usuario" required>
    </div>

    <div class="col-12">
      <label for="password" class="form-label">Contraseña</label>
      <input id="password" name="password" type="password" class="form-control" placeholder="********" required>
    </div>

    <div class="col-12">
      <button type="submit" class="btn btn-primary w-100" onclick="this.form.requestSubmit(); return false;">Entrar</button>
    </div>
  </form>
  <p class="mt-3 mb-0">Si no tienes cuenta, ve a <a href="{% url 'registro' %}{% if next_url %}?next={{ next_url|urlencode }}{% endif %}">Registro</a>.</p>
{% endblock %}
